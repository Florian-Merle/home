"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
format = '$directory$git_branch${custom.git_dirty} $character'
palette = "github_light"

[directory]
format = "[ $path ]($style)"
style = "bg:bg1 fg:fg bold"
truncate_to_repo = false

[git_branch]
format = "[ $branch ]($style)"
style = "bold bg:bg2 fg:fg"

[custom.git_dirty]
when = 'git rev-parse --is-inside-work-tree >/dev/null 2>&1 && ( ! git diff-files --quiet || ! git diff-index --quiet --cached HEAD || [ -n "$(git ls-files -o --exclude-standard)" ] )'
format = " [\uf440]($style)"
style = "fg:yellow bold"

[palettes.github_light]
bg0 = "#FFFFFF"
bg1 = "#F6F8FA"
bg2 = "#E1E4E8"
fg = "#24292F"
fg0 = "#57606A"
muted = "#768390"
red = "#CF222E"
green = "#1A7F37"
yellow = "#9A6700"
blue = "#0969DA"
magenta = "#8250DF"
cyan = "#1B7C83"
mustard = "#C69026"
